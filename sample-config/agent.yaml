agent:
  serviceName: order-service
  enabled: true

storage:
  type: yaml
  outputDir: ./recordings
  fileStrategy: trace-per-file
  kafka:
    bootstrapServers: localhost:9092
    topic: traffic-recordings
    clientId: traffic-recorder-agent
    compressionType: lz4
    acks: "1"
  mongo:
    connectionString: mongodb://localhost:27017
    database: traffic_recorder
    ttlDays: 30

async:
  enabled: true
  workerThreads: 1
  queueSize: 10000
  shutdownDrainMillis: 5000

kafka:
  enabled: true
  capturePayloads: true
  includeTopics:
    - orders.*
  excludeTopics: []

http:
  enabled: true
  capturePayloads: true

redis:
  enabled: true
  capturePayloads: true

mongo:
  enabled: true
  capturePayloads: true

payload:
  maxBytes: 65536
  prettyPrintJson: true
  binaryPolicy: base64

redaction:
  headers:
    - Authorization
    - Cookie
    - Set-Cookie
  jsonFields:
    - password
    - token
    - accessToken
    - refreshToken
    - ssn
  mongoFields:
    - password
    - accessToken
  redisKeyPatterns:
    - session:*
